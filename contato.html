<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Contato | TechVision</title>
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="theme-color" content="#ffffff">
    <link rel="stylesheet" href="estilo.css">
</head>
<body class="bg-fullscreen page-contato">

    <header>
        <a href="index.html" style="text-decoration: none;"><div class="logo">TECHVISION.</div></a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main style="padding-top: 120px;">
        <div class="contact-wrapper">
            <h2 style="text-align: center; margin-bottom: 20px;">Fale Conosco</h2>
            <form id="contactForm">
                <label>Nome</label>
                <input type="text" placeholder="Seu nome" required>
                
                <label>E-mail</label>
                <input type="email" placeholder="seu@email.com" required>
                
                <label>Mensagem</label>
                <textarea rows="4" placeholder="Como podemos ajudar?" required></textarea>
                
                <div style="text-align: center;">
                    <button type="submit" class="btn-submit">Enviar Proposta</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('contactForm').onsubmit = function(e) {
            e.preventDefault();
            alert('Dados enviados com sucesso! Nossa equipe entrará em contato em breve.');
            this.reset();
        };
    </script>

    <footer><p>&copy; 2026 TechVision Intelligence.</p></footer>
</body>
</html>
