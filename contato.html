<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Entre em contato com a TechVision">
    <title>Contato | TechVision</title>
    
    <!-- Favicon - Ícone de email para Contato -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff00c1'/%3E%3Ctext x='50' y='72' font-size='55' text-anchor='middle' fill='white'%3E📧%3C/text%3E%3C/svg%3E">
    
    <link rel="stylesheet" href="estilo.css">
</head>
<body class="bg-fullscreen page-contato">

    <header>
        <a href="index.html" class="logo-link">
            <div class="logo">TECHVISION.</div>
        </a>
        
        <!-- Botão do menu hambúrguer -->
        <button class="menu-toggle" id="menuToggle" aria-label="Menu">
            <span class="hamburger"></span>
        </button>
        
        <nav id="mainNav">
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
        
        <!-- Overlay para fechar o menu ao clicar fora -->
        <div class="nav-overlay" id="navOverlay"></div>
    </header>

    <main>
        <div class="contact-wrapper">
            <h2>Fale Conosco</h2>
            <form id="contactForm">
                <label for="nome">Nome completo *</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
                
                <label for="email">E-mail *</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                
                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999">
                
                <label for="assunto">Assunto *</label>
                <select id="assunto" name="assunto" required>
                    <option value="" disabled selected>Selecione uma opção</option>
                    <option value="orcamento">Orçamento</option>
                    <option value="duvida">Dúvidas</option>
                    <option value="parceria">Parceria</option>
                    <option value="outros">Outros</option>
                </select>
                
                <label for="mensagem">Mensagem *</label>
                <textarea id="mensagem" name="mensagem" rows="4" placeholder="Como podemos ajudar?" required></textarea>
                
                <div class="btn-container">
                    <button type="submit" class="btn-submit">Enviar Proposta</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 TechVision Intelligence. Todos os direitos reservados.</p>
    </footer>

    <script>
        // Menu hambúrguer
        const menuToggle = document.getElementById('menuToggle');
        const mainNav = document.getElementById('mainNav');
        const navOverlay = document.getElementById('navOverlay');
        
        function toggleMenu() {
            menuToggle.classList.toggle('active');
            mainNav.classList.toggle('active');
            navOverlay.classList.toggle('active');
            document.body.style.overflow = mainNav.classList.contains('active') ? 'hidden' : '';
        }
        
        function closeMenu() {
            menuToggle.classList.remove('active');
            mainNav.classList.remove('active');
            navOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }
        
        menuToggle.addEventListener('click', toggleMenu);
        navOverlay.addEventListener('click', closeMenu);
        
        const navLinks = document.querySelectorAll('nav ul li a');
        navLinks.forEach(link => {
            link.addEventListener('click', closeMenu);
        });
        
        window.addEventListener('resize', function() {
            if (window.innerWidth > 768) {
                closeMenu();
            }
        });
        
        // Formulário
        document.getElementById('contactForm').onsubmit = function(e) {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const assunto = document.getElementById('assunto').value;
            const mensagem = document.getElementById('mensagem').value.trim();
            
            if (!nome || !email || !assunto || !mensagem) {
                alert('Por favor, preencha todos os campos obrigatórios.');
                return;
            }
            
            const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('Por favor, insira um e-mail válido.');
                return;
            }
            
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.textContent = '✓ Mensagem enviada com sucesso! Nossa equipe entrará em contato em breve.';
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 4000);
            
            this.reset();
        };
    </script>
</body>
</html>
